name: Feature request
description: Suggest a capability or behaviour change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that alt doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        What would you want alt to do? CLI shape, on-disk effect,
        and any compatibility constraints (git interop, prior data) that
        the design has to honour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other shapes you weighed.
    validations:
      required: false
