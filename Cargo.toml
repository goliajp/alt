[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2024"

[workspace.dependencies]
alt-git-codec = { path = "crates/alt-git-codec" }
alt-repo = { path = "crates/alt-repo" }

bstr = "1"
flate2 = { version = "1", default-features = false, features = ["zlib-rs"] }
sha1 = "0.10"
sha2 = "0.10"
tempfile = "3"
thiserror = "2"
